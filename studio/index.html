<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0a1e">
<title>Risa's Studio</title>
<link rel="icon" type="image/jpeg" href="../assets/risa-icon.jpeg">
<link rel="apple-touch-icon" href="../assets/risa-icon.jpeg">
<style>
  :root {
    --bg: #0f0a1e; --bg2: #1a1030; --accent: #ff6ec7; --accent2: #6ee0ff;
    --gold: #ffd369; --text: #f5f5f5; --muted: #999; --card: #1e1538;
    --border: #3a2458; --risa: #ff6ec7; --ai: #6ee0ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden;
    background: linear-gradient(135deg, var(--bg), var(--bg2));
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    font-size: 16px; line-height: 1.6;
  }
  body { display: flex; flex-direction: column; }
  .screen { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .screen.active { display: flex; }

  /* ========== Dashboard ========== */
  #screen-dashboard { padding: 24px 20px; overflow-y: auto; }
  .dash-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .dash-header img {
    width: 60px; height: 60px; border-radius: 50%;
    border: 3px solid var(--accent);
    box-shadow: 0 0 20px rgba(255,110,199,0.3);
  }
  .dash-header .greeting { flex: 1; }
  .dash-header h1 {
    font-size: 1.4em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .version-badge {
    font-size: 0.55em;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(255, 211, 105, 0.12);
    border: 1px solid var(--gold);
    color: var(--gold);
    -webkit-text-fill-color: var(--gold);
    font-weight: normal;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .dash-header p { color: var(--muted); font-size: 0.85em; }

  .new-chat-btn {
    display: block; width: 100%;
    padding: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; border: none; border-radius: 16px;
    font-size: 1.1em; font-weight: bold;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 8px 25px rgba(255,110,199,0.3);
    transition: transform 0.15s;
    margin-bottom: 20px;
  }
  .new-chat-btn:active { transform: scale(0.98); }

  .history-section-title {
    display: flex; justify-content: space-between; align-items: center;
    margin: 8px 0 12px; color: var(--accent2); font-size: 0.95em;
  }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-card-wrapper { position: relative; }
  .history-card {
    display: block; width: 100%;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 52px 14px 16px;
    cursor: pointer; font-family: inherit;
    text-align: left; color: var(--text);
    transition: all 0.2s;
  }
  .history-card:active { background: rgba(255,110,199,0.08); border-color: var(--accent); }
  .history-title {
    font-weight: bold; color: var(--gold); font-size: 0.95em;
    margin-bottom: 4px; word-break: break-word;
  }
  .history-meta {
    font-size: 0.75em; color: var(--muted);
    display: flex; justify-content: space-between; gap: 8px;
  }
  .history-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 0.68em; font-weight: bold;
  }
  .badge-draft { background: rgba(110,224,255,0.15); color: var(--accent2); border: 1px solid var(--accent2); }
  .badge-done { background: rgba(255,211,105,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .badge-empty { background: rgba(150,150,150,0.15); color: var(--muted); border: 1px solid var(--muted); }
  .delete-btn {
    position: absolute; top: 50%; right: 12px;
    transform: translateY(-50%);
    background: rgba(255,80,100,0.1);
    color: #ff5060; border: 1px solid rgba(255,80,100,0.4);
    border-radius: 50%; width: 34px; height: 34px;
    cursor: pointer; font-size: 1em;
  }
  .delete-btn:active { background: rgba(255,80,100,0.25); }
  .history-empty {
    text-align: center; padding: 40px 20px; color: var(--muted);
    background: rgba(0,0,0,0.2); border-radius: 12px;
    border: 1px dashed var(--border);
  }

  /* ========== Topic Input ========== */
  #screen-topic { padding: 24px 22px; overflow-y: auto; }
  #screen-topic header, #screen-confirm header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  #screen-topic header img, #screen-confirm header img {
    width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent);
  }
  #screen-topic header h2, #screen-confirm header h2 {
    font-size: 1.1em; color: var(--accent2);
  }
  #screen-topic header p, #screen-confirm header p { color: var(--muted); font-size: 0.82em; }
  .topic-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; margin-bottom: 14px;
  }
  .topic-card h3 { color: var(--gold); font-size: 0.95em; margin-bottom: 12px; }
  .topic-card input {
    width: 100%; padding: 14px 16px;
    background: rgba(0,0,0,0.3); border: 2px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 1.05em; font-family: inherit;
  }
  .topic-card input:focus { outline: none; border-color: var(--accent2); }
  .quick-suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip {
    background: rgba(110, 224, 255, 0.1); border: 1px solid var(--accent2);
    color: var(--accent2); padding: 6px 12px; border-radius: 18px;
    font-size: 0.82em; cursor: pointer;
  }
  .chip:active { background: rgba(110, 224, 255, 0.25); }

  /* ========== Confirm with image cards ========== */
  #screen-confirm { padding: 24px 22px; overflow-y: auto; }
  .confirm-hint {
    background: rgba(255, 211, 105, 0.08); border-left: 3px solid var(--gold);
    padding: 10px 14px; border-radius: 8px; margin-bottom: 16px;
    color: var(--gold); font-size: 0.85em;
  }
  .candidate-list {
    display: flex; flex-direction: column; gap: 10px;
  }
  .candidate-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: all 0.2s;
    display: flex; gap: 12px; padding: 10px;
    text-align: left; font-family: inherit; color: var(--text);
    width: 100%;
  }
  .candidate-card:active {
    border-color: var(--accent);
    transform: scale(0.99);
    background: rgba(255,110,199,0.05);
  }
  .candidate-card img {
    width: 70px; height: 100px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    background: #000;
  }
  .candidate-card-body {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .candidate-card-title {
    color: var(--gold); font-weight: bold;
    font-size: 0.92em; line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    margin-bottom: 2px;
  }
  .candidate-card-romaji {
    color: var(--accent2); font-size: 0.72em;
    margin-bottom: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .candidate-card-meta {
    color: var(--muted); font-size: 0.72em;
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .candidate-card-meta span { white-space: nowrap; }
  .candidate-card-synopsis {
    color: #c8c8d0; font-size: 0.75em;
    line-height: 1.45;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }

  /* ========== Loading/Confirm shared ========== */
  .loading-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 40px 22px; text-align: center;
  }
  .loading-card p { margin-top: 14px; color: var(--muted); font-size: 0.9em; }
  .error-box {
    background: rgba(255, 80, 100, 0.1); border: 1px solid #ff5060;
    padding: 14px 18px; border-radius: 10px; color: #ffb0b8;
    font-size: 0.85em; margin-bottom: 14px; word-break: break-all;
  }
  .confirm-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; margin-bottom: 14px;
  }
  .confirm-hero {
    display: flex; gap: 14px; margin-bottom: 14px;
  }
  .confirm-hero img {
    width: 100px; aspect-ratio: 2/3; object-fit: cover;
    border-radius: 8px; flex-shrink: 0;
    border: 2px solid var(--accent);
  }
  .confirm-hero-info { flex: 1; min-width: 0; }
  .confirm-title {
    font-size: 1.15em; color: var(--gold); font-weight: bold;
    margin-bottom: 4px; word-break: break-word;
  }
  .confirm-en { color: var(--accent2); font-size: 0.82em; margin-bottom: 10px; word-break: break-word; }
  .confirm-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .meta-chip {
    background: rgba(255, 211, 105, 0.1); color: var(--gold);
    border: 1px solid rgba(255, 211, 105, 0.3);
    padding: 3px 10px; border-radius: 12px; font-size: 0.72em;
  }
  .confirm-synopsis {
    color: #d8d8e0; font-size: 0.88em; padding: 12px 14px;
    background: rgba(0,0,0,0.3); border-radius: 10px;
    border-left: 3px solid var(--accent); line-height: 1.55;
  }
  .season-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .season-btn {
    background: rgba(255, 110, 199, 0.08); border: 1px solid var(--accent);
    border-radius: 12px; padding: 14px 16px; color: var(--text);
    cursor: pointer; text-align: left; font-family: inherit; font-size: 0.92em;
  }
  .season-btn:active { background: rgba(255, 110, 199, 0.25); }
  .season-name { font-weight: bold; color: var(--accent); margin-bottom: 4px; }
  .season-info { font-size: 0.78em; color: var(--muted); }
  .season-brief { font-size: 0.82em; color: #d8d8d8; margin-top: 6px; line-height: 1.5; }

  /* ========== Chat ========== */
  .chat-header {
    padding: 14px 16px;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .chat-header .back-btn {
    background: transparent; border: 1px solid var(--accent2);
    color: var(--accent2); padding: 6px 10px; border-radius: 16px;
    font-size: 0.78em; cursor: pointer; font-family: inherit;
    flex-shrink: 0;
  }
  .chat-header img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); }
  .chat-header .info { flex: 1; min-width: 0; }
  .chat-header .info-title { font-size: 0.78em; color: var(--muted); }
  .chat-header .info-topic {
    font-weight: bold; color: var(--gold); font-size: 0.95em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-header .end-btn {
    background: var(--accent); color: #000; border: none;
    padding: 8px 12px; border-radius: 18px; font-size: 0.8em;
    font-weight: bold; cursor: pointer; flex-shrink: 0; font-family: inherit;
  }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px 16px; -webkit-overflow-scrolling: touch; }
  .msg { margin-bottom: 14px; max-width: 85%; animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-ai { margin-right: auto; }
  .msg-risa { margin-left: auto; }
  .msg-bubble {
    padding: 12px 16px; border-radius: 18px;
    line-height: 1.55; font-size: 0.98em; word-wrap: break-word;
  }
  .msg-ai .msg-bubble {
    background: rgba(110, 224, 255, 0.13); border: 1px solid var(--ai);
    border-bottom-left-radius: 4px; color: #d8f5ff;
  }
  .msg-risa .msg-bubble {
    background: rgba(255, 110, 199, 0.18); border: 1px solid var(--risa);
    border-bottom-right-radius: 4px; color: #ffe5f3;
  }
  .msg-typing { display: flex; gap: 5px; padding: 14px 18px; }
  .msg-typing span {
    width: 8px; height: 8px; background: var(--accent2);
    border-radius: 50%; animation: typing 1.4s infinite;
  }
  .msg-typing span:nth-child(2) { animation-delay: 0.2s; }
  .msg-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }
  .voice-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--card); border: 2px solid var(--accent2); color: var(--accent2);
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3em; transition: all 0.2s; font-family: inherit;
  }
  .voice-btn:active { transform: scale(0.92); }
  .voice-btn.listening {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    animation: pulseMic 1.2s ease-in-out infinite;
  }
  @keyframes pulseMic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,110,199,0.6); }
    50% { box-shadow: 0 0 0 12px rgba(255,110,199,0); }
  }
  .voice-toggle-tts {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 14px;
    padding: 3px 8px; font-size: 0.65em;
    cursor: pointer; font-family: inherit;
  }
  .voice-toggle-tts.on { color: var(--gold); border-color: var(--gold); }
  .chat-input-area {
    padding: 12px 14px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border); display: flex; gap: 8px;
    align-items: flex-end; flex-shrink: 0;
  }
  .chat-input-area textarea {
    flex: 1; padding: 12px 16px; background: var(--card);
    border: 2px solid var(--border); border-radius: 22px; color: var(--text);
    font-size: 1em; font-family: inherit; resize: none;
    min-height: 44px; max-height: 120px; line-height: 1.4;
  }
  .chat-input-area textarea:focus { outline: none; border-color: var(--accent); }
  .send-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; border: none; font-size: 1.4em; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; }
  .footer-tip {
    text-align: center; color: var(--muted); font-size: 0.72em;
    padding: 8px 16px; background: rgba(0,0,0,0.3); flex-shrink: 0;
  }
  .progress-bar {
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    flex-shrink: 0;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: visible;
  }
  .progress-bar:active { background: rgba(0,0,0,0.6); }
  .progress-bar.celebrating {
    animation: celebrate 0.8s ease-out;
  }
  @keyframes celebrate {
    0%, 100% { background: rgba(0,0,0,0.4); }
    50% {
      background: rgba(255, 211, 105, 0.2);
      box-shadow: 0 0 25px rgba(255, 211, 105, 0.4);
    }
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.72em; margin-bottom: 4px;
  }
  .progress-header .label { color: var(--accent2); font-weight: bold; }
  .progress-header .value { color: var(--gold); font-weight: bold; }
  .progress-header .label.pulsing {
    animation: labelPulse 0.8s ease-out;
  }
  @keyframes labelPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.15); color: var(--gold); }
    100% { transform: scale(1); color: var(--accent2); }
  }
  .progress-track {
    height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.1); overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
    transition: width 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    position: relative;
  }
  .progress-fill::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: translateX(-100%);
  }
  .progress-fill.shimmer::after {
    animation: shimmer 1s ease-out;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 1.4em;
    animation: sparkleFloat 1.4s ease-out forwards;
    z-index: 50;
  }
  @keyframes sparkleFloat {
    0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(0deg); }
    30% { opacity: 1; transform: translateY(-12px) scale(1.2) rotate(180deg); }
    100% { opacity: 0; transform: translateY(-40px) scale(0.8) rotate(360deg); }
  }
  .progress-increase-badge {
    position: absolute;
    right: 14px;
    top: -8px;
    background: var(--gold);
    color: #000;
    font-size: 0.7em;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: bold;
    animation: badgePop 1.5s ease-out forwards;
    pointer-events: none;
    box-shadow: 0 3px 10px rgba(255, 211, 105, 0.5);
  }
  @keyframes badgePop {
    0% { opacity: 0; transform: translateY(10px) scale(0.6); }
    20% { opacity: 1; transform: translateY(0) scale(1.1); }
    40% { transform: translateY(0) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-20px); }
  }
  .progress-detail {
    display: none;
    margin-top: 10px;
    grid-template-columns: repeat(2, 1fr);
    gap: 4px 8px;
    font-size: 0.68em;
  }
  .progress-detail.open { display: grid; }
  .progress-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2px 0;
  }
  .progress-item-label { color: var(--muted); }
  .progress-item-score { color: var(--gold); font-weight: bold; }
  .progress-item-score.zero { color: #555; }
  .progress-item-score.low { color: var(--ai); }
  .progress-item-score.mid { color: var(--accent); }
  .progress-item-score.high { color: var(--gold); }

  /* ========== Article ========== */
  #screen-article { overflow-y: auto; padding: 24px 22px; }
  #screen-article .article-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  #screen-article .article-header img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent); }
  #screen-article .article-header h2 { color: var(--gold); font-size: 1.05em; }
  #article-content {
    background: var(--card); padding: 20px; border-radius: 14px;
    border: 1px solid var(--border); font-size: 0.92em; line-height: 1.7;
    color: #f0f0f0; margin-bottom: 14px; white-space: pre-wrap;
    max-height: 45vh; overflow-y: auto;
  }
  .quote-box {
    background: rgba(255, 211, 105, 0.08); border: 1px dashed var(--gold);
    padding: 16px 18px; border-radius: 12px; margin: 14px 0;
  }
  .quote-box-label { color: var(--gold); font-size: 0.82em; font-weight: bold; margin-bottom: 10px; }
  .quote-box ul { padding-left: 20px; }
  .quote-box li { margin-bottom: 6px; color: #fff5dc; }
  .article-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

  /* ========== Buttons ========== */
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #000; border: none; border-radius: 12px;
    font-size: 1em; font-weight: bold; cursor: pointer;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: var(--accent2); border: 2px solid var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); color: var(--gold);
    padding: 12px 22px; border-radius: 24px; font-size: 0.88em;
    z-index: 200; border: 1px solid var(--gold);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .loader {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid rgba(255,110,199,0.3); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ========== DASHBOARD (default) ========== -->
<section id="screen-dashboard" class="screen active">
  <div class="dash-header">
    <img src="../assets/risa-icon.jpeg" alt="Risa">
    <div class="greeting">
      <h1>Risa's Studio 🌸 <span class="version-badge">Ver 1.8</span></h1>
      <p id="greeting-text">こんにちは Risaさん</p>
    </div>
  </div>

  <button class="new-chat-btn" onclick="goToNewChat()">
    ✨ 新しい会話を始める
  </button>

  <div class="history-section-title">
    <span>📚 過去の会話</span>
    <span id="history-count" style="color:var(--muted); font-size:0.75em;"></span>
  </div>

  <div id="dashboard-loading" class="loading-card" style="display:none;"><div class="loader"></div><p>読み込み中...</p></div>
  <div id="dashboard-history" class="history-list"></div>
</section>

<!-- ========== TOPIC INPUT ========== -->
<section id="screen-topic" class="screen">
  <header>
    <img src="../assets/risa-icon.jpeg" alt="Risa">
    <div>
      <h2>どの作品の話をしますか? 🎬</h2>
      <p>作品名を入力するか、候補から選んでください</p>
    </div>
  </header>
  <div class="topic-card">
    <h3>📺 作品名を入力</h3>
    <input id="topic-input" type="text" placeholder="例: frieren, リゼロ, 無職転生..." autocomplete="off">
    <div class="quick-suggestions">
      <span class="chip" onclick="setTopic('frieren')">フリーレン</span>
      <span class="chip" onclick="setTopic('mushoku tensei')">無職転生</span>
      <span class="chip" onclick="setTopic('re zero')">リゼロ</span>
      <span class="chip" onclick="setTopic('madoka magica')">まどマギ</span>
      <span class="chip" onclick="setTopic('konosuba')">このすば</span>
    </div>
  </div>
  <button id="start-btn" class="btn">この作品を探す 🔍</button>
  <div style="height:12px;"></div>
  <button class="btn btn-ghost" onclick="showScreen('screen-dashboard')">↩️ ダッシュボードに戻る</button>
</section>

<!-- ========== CONFIRM (image candidates) ========== -->
<section id="screen-confirm" class="screen">
  <header>
    <img src="../assets/risa-icon.jpeg" alt="Risa">
    <div>
      <h2 id="confirm-header-title">この作品で合ってますか? 🎬</h2>
      <p id="confirm-header-sub">見つかった候補から選んでください</p>
    </div>
  </header>
  <div id="confirm-loading" class="loading-card"><div class="loader"></div><p>検索中...</p></div>
  <div id="confirm-result" style="display:none;">
    <div id="confirm-error" class="error-box" style="display:none;"></div>
    <div id="confirm-container"></div>
    <div style="margin-top:16px;">
      <button class="btn btn-ghost" onclick="showScreen('screen-topic')">↩️ 検索に戻る</button>
    </div>
  </div>
</section>

<!-- ========== CHAT ========== -->
<section id="screen-chat" class="screen">
  <header class="chat-header">
    <button class="back-btn" onclick="showScreen('screen-dashboard')">← ダッシュボード</button>
    <img src="../assets/risa-icon.jpeg" alt="Risa">
    <div class="info">
      <div class="info-title">話し中</div>
      <div class="info-topic" id="chat-topic">—</div>
    </div>
    <button class="end-btn" id="end-btn">記事化 ✓</button>
  </header>
  <div class="progress-bar" id="progress-bar" onclick="toggleProgressDetail()">
    <div class="progress-header">
      <span class="label" id="progress-label">📊 取れ高: 0%</span>
      <span class="value" id="progress-msg-count">0 messages</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%;"></div>
    </div>
    <div class="progress-detail" id="progress-detail"></div>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-area">
    <button class="voice-btn" id="voice-btn" title="音声入力">🎤</button>
    <textarea id="chat-input" placeholder="メッセージ / 🎤で音声入力" rows="1"></textarea>
    <button class="send-btn" id="send-btn">▶</button>
  </div>
  <div class="footer-tip">
    <button class="voice-toggle-tts" id="tts-toggle" onclick="toggleTTS()">🔊 読み上げ OFF</button>
    &nbsp;
    <button class="voice-toggle-tts" id="tts-speed" onclick="cycleTTSSpeed()">⏩ 速度 1.0x</button>
    &nbsp;&nbsp;疲れたら「記事化」で終了 🌸
  </div>
</section>

<!-- ========== ARTICLE ========== -->
<section id="screen-article" class="screen">
  <div class="article-header">
    <img src="../assets/risa-icon.jpeg" alt="Risa">
    <div>
      <h2>記事ドラフト完成 ✨</h2>
      <p style="color:var(--muted); font-size:0.8em;">Newsletter記事</p>
    </div>
  </div>
  <div id="article-loading" class="loading-card"><div class="loader"></div><p>記事を生成しています...</p></div>
  <div id="article-result" style="display:none;">
    <div id="article-error" class="error-box" style="display:none;"></div>
    <div id="lang-tabs" style="display:flex; gap:8px; margin-bottom:12px;">
      <button class="btn btn-secondary" id="tab-ja" onclick="switchLang('ja')" style="padding:10px;">🇯🇵 日本語</button>
      <button class="btn btn-ghost" id="tab-en" onclick="switchLang('en')" style="padding:10px;">🇺🇸 English</button>
    </div>
    <div id="article-content"></div>
    <div id="ratings-box" style="display:none; background:rgba(110,224,255,0.08); border:1px dashed var(--accent2); padding:16px; border-radius:12px; margin:14px 0;">
      <div style="color:var(--accent2); font-size:0.82em; font-weight:bold; margin-bottom:10px;">📊 評価サマリー</div>
      <div id="ratings-list"></div>
    </div>
    <div id="quotes-box" class="quote-box" style="display:none;">
      <div class="quote-box-label">💎 今回の名言ベスト3</div>
      <ul id="quotes-list"></ul>
    </div>
    <div class="article-actions">
      <button class="btn" id="send-banno-btn">📮 Bannoに送る</button>
      <button class="btn btn-secondary" id="copy-btn">📋 テキストをコピー</button>
      <button class="btn btn-ghost" onclick="showScreen('screen-dashboard')">🏠 ダッシュボードへ</button>
    </div>
  </div>
</section>

<div id="toast" class="toast"></div>

<script>
const API_BASE = "https://risa-studio-api.ai-fudosan.workers.dev";

const state = {
  topic: null,
  workInfo: null,
  selectedSeason: null,
  briefing: null,
  sessionId: null,
  conversation: [],
  candidates: [],
  isGenerating: false,
  isResuming: false,
  lastProgress: 0,
};

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if (id === "screen-dashboard") loadDashboard();
}

function resetState() {
  state.topic = null; state.workInfo = null; state.selectedSeason = null;
  state.briefing = null; state.sessionId = null;
  state.conversation = []; state.candidates = [];
}

function goToNewChat() {
  resetState();
  document.getElementById("topic-input").value = "";
  showScreen("screen-topic");
}

// ============================================================
// DASHBOARD
// ============================================================
async function loadDashboard() {
  document.getElementById("dashboard-loading").style.display = "block";
  document.getElementById("dashboard-history").innerHTML = "";
  try {
    const res = await fetch(`${API_BASE}/api/session/list`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({})
    });
    const data = await res.json();
    renderDashboardHistory(data.sessions || []);
  } catch (e) {
    document.getElementById("dashboard-history").innerHTML = `<div class="history-empty">読み込みエラー: ${escapeHtml(e.message)}</div>`;
  } finally {
    document.getElementById("dashboard-loading").style.display = "none";
  }
}

function renderDashboardHistory(sessions) {
  const container = document.getElementById("dashboard-history");
  document.getElementById("history-count").textContent = sessions.length ? `${sessions.length}件` : "";
  if (!sessions.length) {
    container.innerHTML = `<div class="history-empty">まだ会話履歴がありません 🌸<br>上の「新しい会話を始める」から開始してください</div>`;
    return;
  }
  container.innerHTML = sessions.map(s => {
    const info = s.work_info || {};
    const title = info.title_ja || s.topic || "無題";
    const season = s.season?.name ? ` (${s.season.name})` : "";
    const dateStr = formatJST(s.updated_at || s.created_at);
    let badge, badgeClass;
    if (s.article) { badge = "記事化済"; badgeClass = "badge-done"; }
    else if (Array.isArray(s.conversation) && s.conversation.length > 0) { badge = `${s.conversation.length}往復`; badgeClass = "badge-draft"; }
    else { badge = "未開始"; badgeClass = "badge-empty"; }
    const safeTitle = escapeHtml(title).replace(/'/g, "&#39;");
    return `
      <div class="history-card-wrapper">
        <button class="history-card" onclick="resumeSession('${s.id}')">
          <div class="history-title">${escapeHtml(title)}${escapeHtml(season)}</div>
          <div class="history-meta">
            <span>🕐 ${dateStr}</span>
            <span class="history-badge ${badgeClass}">${badge}</span>
          </div>
        </button>
        <button class="delete-btn" onclick="event.stopPropagation(); deleteSession('${s.id}', '${safeTitle}')" title="削除">🗑</button>
      </div>
    `;
  }).join("");
}

async function deleteSession(id, title) {
  if (!confirm(`「${title}」の会話を削除しますか?\nこの操作は取り消せません。`)) return;
  try {
    const res = await fetch(`${API_BASE}/api/session/delete`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    });
    const data = await res.json();
    if (data.error) { showToast("削除エラー: " + data.error); return; }
    showToast("🗑️ 削除しました");
    loadDashboard();
  } catch (e) {
    showToast("削除失敗: " + e.message);
  }
}

// ============================================================
// TOPIC INPUT
// ============================================================
function setTopic(t) { document.getElementById("topic-input").value = t; }

document.getElementById("start-btn").onclick = async () => {
  const topic = document.getElementById("topic-input").value.trim();
  if (!topic) { showToast("作品名を入力してください"); return; }
  state.topic = topic;
  showScreen("screen-confirm");
  document.getElementById("confirm-loading").style.display = "block";
  document.getElementById("confirm-result").style.display = "none";
  document.getElementById("confirm-error").style.display = "none";
  try {
    const res = await fetch(`${API_BASE}/api/identify`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: topic })
    });
    const data = await res.json();
    state.candidates = data.candidates || [];
    const gemini = data.gemini_info || {};
    if (state.candidates.length > 0) {
      renderCandidateGrid(state.candidates, gemini);
    } else if (gemini.found) {
      // No images but Gemini gave info — use text-only confirm
      state.workInfo = gemini;
      renderTextOnlyConfirm(gemini);
    } else {
      throw new Error("作品が見つかりませんでした");
    }
    document.getElementById("confirm-loading").style.display = "none";
    document.getElementById("confirm-result").style.display = "block";
  } catch (e) {
    document.getElementById("confirm-loading").style.display = "none";
    document.getElementById("confirm-result").style.display = "block";
    const errEl = document.getElementById("confirm-error");
    errEl.style.display = "block";
    errEl.textContent = "エラー: " + (e.message || "不明");
    document.getElementById("confirm-container").innerHTML = "";
  }
};

function renderCandidateGrid(candidates, gemini) {
  document.getElementById("confirm-header-title").textContent = "どの作品ですか? 🎬";
  document.getElementById("confirm-header-sub").textContent = "タップして選んでください";
  const container = document.getElementById("confirm-container");
  const baseTitle = (candidates[0]?.title_japanese || candidates[0]?.title || state.topic || "").replace(/\s*\(?\d{4}\)?\s*$/, "").trim();
  const allSeriesBtn = `
    <button class="candidate-card" onclick="selectAllSeries()" style="border-color:var(--gold); background:rgba(255,211,105,0.08);">
      <div style="width:70px;height:100px;background:linear-gradient(135deg,rgba(255,211,105,0.2),rgba(255,110,199,0.2));border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:2em;">🌐</div>
      <div class="candidate-card-body">
        <div>
          <div class="candidate-card-title" style="color:var(--gold);">シリーズ全体で話す</div>
          <div class="candidate-card-romaji">All seasons & movies</div>
          <div class="candidate-card-meta"><span>作品全体について</span></div>
        </div>
        <div class="candidate-card-synopsis">特定のシーズンではなく、${escapeHtml(baseTitle) || "この作品"}シリーズ全体についてRisaさんと語りたい時はこちら</div>
      </div>
    </button>
  `;
  const listHtml = `
    <div class="confirm-hint">💡 タップしてあなたが話したい作品を選んでください</div>
    <div class="candidate-list">
      ${allSeriesBtn}
      ${candidates.map((c, i) => {
        const jpTitle = c.title_japanese || c.title || "";
        const romaji = c.title && c.title !== jpTitle ? c.title : "";
        const scoreFormatted = c.score ? (typeof c.score === "number" ? c.score.toFixed(1) : c.score) : "";
        return `
        <button class="candidate-card" onclick="selectCandidate(${i})">
          ${c.image_url ? `<img src="${escapeHtml(c.image_url)}" alt="${escapeHtml(c.title)}" loading="lazy" onerror="this.style.display='none'">` : '<div style="width:70px;height:100px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--muted);border-radius:8px;flex-shrink:0;">🖼</div>'}
          <div class="candidate-card-body">
            <div>
              <div class="candidate-card-title">${escapeHtml(jpTitle) || "(無題)"}</div>
              ${romaji ? `<div class="candidate-card-romaji">${escapeHtml(romaji)}</div>` : ""}
              <div class="candidate-card-meta">
                ${c.year ? `<span>📅 ${escapeHtml(String(c.year))}</span>` : ""}
                ${c.episodes ? `<span>📺 ${escapeHtml(String(c.episodes))}話</span>` : ""}
                ${scoreFormatted ? `<span>⭐ ${escapeHtml(String(scoreFormatted))}</span>` : ""}
                ${c.studios ? `<span>🏢 ${escapeHtml(c.studios.split(",")[0])}</span>` : ""}
              </div>
            </div>
            ${c.synopsis ? `<div class="candidate-card-synopsis">${escapeHtml(c.synopsis)}</div>` : ""}
          </div>
        </button>
        `;
      }).join("")}
    </div>
  `;
  container.innerHTML = listHtml;
}

async function selectAllSeries() {
  // Use the first candidate as base info, but mark as "all series"
  const baseCand = state.candidates[0] || {};
  const baseTitle = (baseCand.title_japanese || baseCand.title || state.topic || "").replace(/\s*\(?\d{4}\)?\s*$/, "").trim();
  state.workInfo = {
    title_ja: baseTitle,
    title_en: (baseCand.title_english || baseCand.title || state.topic).replace(/\s*\(?\d{4}\)?\s*$/, "").trim(),
    studio: baseCand.studios || "",
    year: "",
    genre: (baseCand.genres || []).join(", "),
    synopsis: baseCand.synopsis || "",
    image_url: baseCand.image_url,
    seasons: [{ name: "全シリーズ", year: "", episodes: "", brief: "シリーズ全体" }]
  };
  state.selectedSeason = state.workInfo.seasons[0];
  proceedToChat();
}

function renderTextOnlyConfirm(info) {
  document.getElementById("confirm-header-title").textContent = "この作品で合ってますか? 🎬";
  const container = document.getElementById("confirm-container");
  let html = `
    <div class="confirm-card">
      <div class="confirm-title">🎬 ${escapeHtml(info.title_ja || state.topic)}</div>
      <div class="confirm-en">${escapeHtml(info.title_en || "")}</div>
      <div class="confirm-meta">
        ${info.studio ? `<span class="meta-chip">🏢 ${escapeHtml(info.studio)}</span>` : ""}
        ${info.year ? `<span class="meta-chip">📅 ${escapeHtml(info.year)}</span>` : ""}
        ${info.genre ? `<span class="meta-chip">🎭 ${escapeHtml(info.genre)}</span>` : ""}
      </div>
      <div class="confirm-synopsis">${escapeHtml(info.synopsis || "")}</div>
    </div>
    <div class="topic-card">
      <h3>📺 どのシリーズを話しますか?</h3>
      <div class="season-list" id="season-list"></div>
    </div>
  `;
  container.innerHTML = html;
  renderSeasonList(info.seasons || [{name:"全シリーズ", year:info.year, episodes:"", brief:"作品全体"}]);
}

function renderSeasonList(seasons) {
  const list = document.getElementById("season-list");
  if (!list) return;
  list.innerHTML = seasons.map((s, idx) => `
    <button class="season-btn" onclick="selectSeason(${idx})">
      <div class="season-name">${escapeHtml(s.name)}</div>
      <div class="season-info">${escapeHtml(s.year || "")}${s.episodes ? " · " + escapeHtml(s.episodes) : ""}</div>
      ${s.brief ? `<div class="season-brief">${escapeHtml(s.brief)}</div>` : ""}
    </button>
  `).join("") + (seasons.length > 1 ? `
    <button class="season-btn" onclick="selectSeason(-1)" style="border-color:var(--gold); background:rgba(255,211,105,0.08);">
      <div class="season-name" style="color:var(--gold);">🌐 シリーズ全体について話す</div>
    </button>
  ` : "");
}

async function selectCandidate(idx) {
  const cand = state.candidates[idx];
  if (!cand) return;
  // Build workInfo from the chosen candidate
  state.workInfo = {
    title_ja: cand.title_japanese || cand.title,
    title_en: cand.title_english || cand.title,
    studio: cand.studios || "",
    year: cand.year || (cand.aired_from ? cand.aired_from.slice(0,4) : ""),
    genre: (cand.genres || []).join(", "),
    synopsis: cand.synopsis || "",
    image_url: cand.image_url,
    mal_id: cand.mal_id,
    anilist_id: cand.anilist_id,
    seasons: [{
      name: cand.title_english || cand.title,
      year: cand.year || "",
      episodes: cand.episodes ? `${cand.episodes}話` : "",
      brief: ""
    }],
  };
  // Directly use this single "season" and proceed
  state.selectedSeason = state.workInfo.seasons[0];
  // Proceed: research + session create + chat
  proceedToChat();
}

async function selectSeason(idx) {
  const seasons = state.workInfo.seasons || [];
  state.selectedSeason = idx === -1 ? { name: "全シリーズ" } : seasons[idx];
  proceedToChat();
}

async function proceedToChat() {
  showScreen("screen-confirm");
  const container = document.getElementById("confirm-container");
  container.innerHTML = `<div class="loading-card"><div class="loader"></div><p style="margin-top:14px; color:var(--accent2); font-weight:bold;">サノイチが下調べ中...</p><p id="research-status" style="color:var(--muted); font-size:0.8em;">複数ソースを並列で調査中</p></div>`;
  await runResearchAndWait();
  await createSession();
  startChat();
}

async function runResearchAndWait() {
  try {
    const res = await fetch(`${API_BASE}/api/research`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ workInfo: state.workInfo })
    });
    const data = await res.json();
    if (data.error) { state.briefing = null; return; }
    state.briefing = data.briefing;
  } catch (e) { console.warn("research error:", e); }
}

async function createSession() {
  try {
    const res = await fetch(`${API_BASE}/api/session/create`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        topic: state.topic,
        workInfo: state.workInfo,
        season: state.selectedSeason,
        briefing: state.briefing
      })
    });
    const data = await res.json();
    if (data.session) state.sessionId = data.session.id;
  } catch (e) { console.warn("session create failed:", e); }
}

async function saveSessionConversation() {
  if (!state.sessionId) return;
  try {
    await fetch(`${API_BASE}/api/session/update`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: state.sessionId, conversation: state.conversation })
    });
  } catch (e) { console.warn("session save failed:", e); }
}

async function resumeSession(id) {
  showToast("読み込み中...");
  try {
    const res = await fetch(`${API_BASE}/api/session/get`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    });
    const data = await res.json();
    if (data.error || !data.session) { showToast("セッションが見つかりません"); return; }
    const s = data.session;
    state.sessionId = s.id;
    state.topic = s.topic;
    state.workInfo = s.work_info;
    state.selectedSeason = s.season;
    state.briefing = s.briefing;
    state.conversation = Array.isArray(s.conversation) ? s.conversation : [];
    state.isResuming = true;
    startChat();
    if (s.conversation?.length) showToast(`📖 ${s.conversation.length}件のメッセージを復元`);
  } catch (e) { showToast("読み込みエラー: " + e.message); }
}

// ============================================================
// CHAT
// ============================================================
function isValidHook(s) {
  if (!s || typeof s !== "string") return false;
  const lower = s.trim();
  if (lower.length < 10) return false;
  const badPatterns = ["情報なし", "特になし", "抽出できません", "提供されたデータ", "データから", "情報がありません", "不明", "n/a", "N/A"];
  return !badPatterns.some(p => lower.includes(p));
}

function extractGoodHook(b) {
  if (!b) return null;
  const candidates = [
    b.x_data?.japan_x_chatter, b.x_data?.hot_scenes, b.x_data?.english_x_chatter, b.x_data?.japanese_unique_angles,
    b.japanese_fan_perspective, b.english_fan_perspective, b.overlooked_angles, b.key_staff, b.overview
  ];
  for (const c of candidates) {
    if (isValidHook(c)) {
      const clean = String(c).replace(/^[\-・\s]+/, "").split(/[。\n]/)[0].slice(0, 120);
      if (clean.length >= 10) return clean;
    }
  }
  return null;
}

function startChat() {
  const info = state.workInfo;
  const topicLabel = state.selectedSeason && state.selectedSeason.name !== "全シリーズ"
    ? `${info.title_ja} (${state.selectedSeason.name})`
    : info.title_ja;
  document.getElementById("chat-topic").textContent = topicLabel;
  showScreen("screen-chat");
  if (!state.isResuming) {
    state.conversation = [];
    document.getElementById("messages").innerHTML = "";
    const hook = extractGoodHook(state.briefing);
    let firstMsg;
    if (hook) {
      firstMsg = `こんにちは、AI記者の「サノイチ」です🌸\n\n今日は『${topicLabel}』について Risaさんとお話したいです!\n\n下調べしてきたんですが、「${hook}」という話があって面白いなと思ったんです。\n\nRisaさん的にはこの辺、実際に観てみてどう感じました?`;
    } else {
      firstMsg = `こんにちは、AI記者の「サノイチ」です🌸\n\n今日は『${topicLabel}』について Risaさんとお話したいです!${info.year ? info.year + "年の" : ""}${info.studio ? info.studio + "制作" : ""}なんですね。\n\n正直なところ、私の事前調査だと情報があまり拾えなかったので、今日はRisaさんに色々教えてもらえると嬉しいです。\n\nまず、この作品でRisaさんが一番印象的だったシーンや瞬間って、どこでした?`;
    }
    addMessage("ai", firstMsg);
    // Reset progress meter for fresh chat
    resetProgressMeter();
  } else {
    document.getElementById("messages").innerHTML = "";
    const existing = [...state.conversation];
    state.conversation = [];
    for (const msg of existing) addMessage(msg.role, msg.content);
    state.isResuming = false;
    // Analyze resumed conversation to show current progress
    resetProgressMeter();
    updateProgressMeter();
  }
}

function resetProgressMeter() {
  state.lastProgress = 0;
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("progress-label").textContent = "📊 取れ高: 0%";
  document.getElementById("progress-msg-count").textContent = "0 発言 / 0";
  document.getElementById("progress-detail").innerHTML = "";
  document.getElementById("progress-detail").classList.remove("open");
}

function addMessage(role, content) {
  state.conversation.push({ role, content });
  const messages = document.getElementById("messages");
  const msgDiv = document.createElement("div");
  msgDiv.className = `msg msg-${role}`;
  msgDiv.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
  messages.appendChild(msgDiv);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById("messages");
  const typing = document.createElement("div");
  typing.className = "msg msg-ai";
  typing.id = "typing-indicator";
  typing.innerHTML = `<div class="msg-bubble msg-typing"><span></span><span></span><span></span></div>`;
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;
}
function hideTyping() { const t = document.getElementById("typing-indicator"); if (t) t.remove(); }

// ============================================================
// VOICE (Web Speech API)
// ============================================================
let recognition = null;
let isListening = false;
let ttsEnabled = false;

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = "ja-JP";
  rec.continuous = false;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  return rec;
}

function startVoiceInput() {
  if (!recognition) {
    recognition = initSpeechRecognition();
    if (!recognition) {
      showToast("お使いのブラウザは音声入力に対応していません");
      return;
    }
  }
  const btn = document.getElementById("voice-btn");
  const input = document.getElementById("chat-input");

  recognition.onstart = () => {
    isListening = true;
    btn.classList.add("listening");
    btn.textContent = "⏺";
    showToast("🎤 話してください...");
  };
  recognition.onresult = (e) => {
    let transcript = "";
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    input.value = transcript;
    input.style.height = "auto";
    input.style.height = Math.min(120, input.scrollHeight) + "px";
  };
  recognition.onerror = (e) => {
    console.warn("speech err:", e.error);
    if (e.error === "not-allowed") showToast("マイクの使用が許可されていません");
    else if (e.error !== "aborted") showToast("音声エラー: " + e.error);
    stopVoiceInput();
  };
  recognition.onend = () => { stopVoiceInput(); };
  try { recognition.start(); }
  catch (e) { console.warn(e); stopVoiceInput(); }
}

function stopVoiceInput() {
  isListening = false;
  const btn = document.getElementById("voice-btn");
  btn.classList.remove("listening");
  btn.textContent = "🎤";
}

document.getElementById("voice-btn").onclick = () => {
  if (isListening) {
    try { recognition && recognition.stop(); } catch (e) {}
    stopVoiceInput();
  } else {
    startVoiceInput();
    // First time using voice input → auto enable TTS for full voice conversation
    if (!ttsEnabled && !state.ttsAutoEnabled) {
      ttsEnabled = true;
      state.ttsAutoEnabled = true;
      const btn = document.getElementById("tts-toggle");
      btn.textContent = "🔊 読み上げ ON";
      btn.classList.add("on");
      showToast("🔊 読み上げも自動でONにしました");
    }
  }
};

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const btn = document.getElementById("tts-toggle");
  btn.textContent = ttsEnabled ? "🔊 読み上げ ON" : "🔊 読み上げ OFF";
  btn.classList.toggle("on", ttsEnabled);
  if (!ttsEnabled && window.speechSynthesis) window.speechSynthesis.cancel();
}

// TTS speed cycle: 1.0x → 1.15x → 1.3x → 1.5x → 0.9x → 1.0x
const TTS_SPEEDS = [1.0, 1.15, 1.3, 1.5, 0.9];
let ttsSpeedIndex = parseInt(localStorage.getItem("ttsSpeedIndex") || "0", 10);
function cycleTTSSpeed() {
  ttsSpeedIndex = (ttsSpeedIndex + 1) % TTS_SPEEDS.length;
  localStorage.setItem("ttsSpeedIndex", String(ttsSpeedIndex));
  const speed = TTS_SPEEDS[ttsSpeedIndex];
  const btn = document.getElementById("tts-speed");
  btn.textContent = `⏩ 速度 ${speed}x`;
  btn.classList.toggle("on", speed !== 1.0);
  showToast(`サノイチの声の速度: ${speed}x`);
  // Stop current playback if any
  if (currentAudio) { try { currentAudio.pause(); } catch(e){} currentAudio = null; }
}
// Initialize speed button from saved preference
(function initTTSSpeed() {
  const btn = document.getElementById("tts-speed");
  if (!btn) return;
  const speed = TTS_SPEEDS[ttsSpeedIndex];
  btn.textContent = `⏩ 速度 ${speed}x`;
  btn.classList.toggle("on", speed !== 1.0);
})();
function getTTSSpeed() { return TTS_SPEEDS[ttsSpeedIndex]; }

let sanoichiVoice = null;
let voicesLoaded = false;

function pickSanoichiVoice() {
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  const ja = voices.filter(v => v.lang.startsWith("ja"));
  if (!ja.length) return null;
  // Prefer male Japanese voices (names vary by OS)
  // iOS: Otoya (male), Kyoko (female)
  // Android: ja-JP-Wavenet-C / ja-JP-Wavenet-D (male)
  // macOS: O-ren, Kyoko, Otoya
  // Chrome: Google 日本語 (neutral)
  const malePatterns = /otoya|ichiro|daichi|hiroshi|takumi|wavenet-c|wavenet-d|male|man/i;
  const male = ja.find(v => malePatterns.test(v.name));
  if (male) return male;
  // Second choice: any non-female-sounding voice
  const femalePatterns = /kyoko|haruka|nanami|mizuki|aya|misaki|female|woman/i;
  const nonFemale = ja.find(v => !femalePatterns.test(v.name));
  if (nonFemale) return nonFemale;
  // Fall back to first Japanese voice (will pitch down)
  return ja[0];
}

if (window.speechSynthesis) {
  // Voices load asynchronously
  window.speechSynthesis.onvoiceschanged = () => {
    sanoichiVoice = pickSanoichiVoice();
    voicesLoaded = true;
  };
  // Also try immediately (some browsers have them ready)
  setTimeout(() => {
    if (!voicesLoaded) {
      sanoichiVoice = pickSanoichiVoice();
      voicesLoaded = true;
    }
  }, 500);
}

let currentAudio = null;

async function speakAIResponse(text) {
  if (!ttsEnabled) return;
  // Stop any ongoing audio
  if (currentAudio) { try { currentAudio.pause(); } catch(e){} currentAudio = null; }
  if (window.speechSynthesis) { try { window.speechSynthesis.cancel(); } catch(e){} }

  // Try Google Cloud Neural2 TTS first (via Worker)
  try {
    const res = await fetch(`${API_BASE}/api/tts`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text: text,
        voice: "ja-JP-Neural2-D",  // Deep male voice
        pitch: -4.0,
        rate: getTTSSpeed()
      })
    });
    const data = await res.json();
    if (data.error || !data.audio) {
      console.warn("Google TTS failed:", data.error);
      speakAIResponseBrowserFallback(text);
      return;
    }
    // Play base64 MP3
    currentAudio = new Audio("data:audio/mp3;base64," + data.audio);
    currentAudio.play().catch(e => {
      console.warn("audio play failed:", e);
      speakAIResponseBrowserFallback(text);
    });
  } catch (e) {
    console.warn("TTS request failed:", e);
    speakAIResponseBrowserFallback(text);
  }
}

function speakAIResponseBrowserFallback(text) {
  if (!window.speechSynthesis) return;
  const clean = text
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F1E0}-\u{1F1FF}]/gu, "")
    .replace(/\*\*/g, "")
    .replace(/\n+/g, "。")
    .slice(0, 500);
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = "ja-JP";
    utter.rate = getTTSSpeed();
    utter.pitch = 0.75;
    utter.volume = 1.0;
    if (!sanoichiVoice) sanoichiVoice = pickSanoichiVoice();
    if (sanoichiVoice) utter.voice = sanoichiVoice;
    window.speechSynthesis.speak(utter);
  } catch (e) { console.warn("fallback tts err:", e); }
}

async function sendMessage() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || state.isGenerating) return;
  input.value = ""; input.style.height = "auto";
  addMessage("risa", text);
  state.isGenerating = true;
  showTyping();
  try {
    const reply = await callGeminiChat();
    hideTyping();
    addMessage("ai", reply);
    saveSessionConversation();
    // TTS: speak AI reply if enabled
    speakAIResponse(reply);
    // Update progress meter (fire-and-forget, don't block)
    updateProgressMeter();
  } catch (e) {
    hideTyping();
    addMessage("ai", "ごめんなさい、エラー: " + (e.message || "不明"));
  } finally {
    state.isGenerating = false;
  }
}

const CATEGORY_LABELS = {
  animation: "🎨 作画",
  story: "📖 脚本",
  voice_acting: "🎙️ 声優",
  music: "🎵 音楽",
  direction: "🎬 演出",
  characters: "👥 キャラ",
  emotional_impact: "💖 感情",
  memorable_scenes: "🎞 名場面",
  female_gaze: "🌸 女性視点",
  rewatch_value: "🔁 リピート",
  comparable_works: "🔀 比較",
  improvements: "⚠️ 改善点",
  overlooked_angles: "🇯🇵 日本視点",
  overall_rating: "⭐ 総合評価",
};

async function updateProgressMeter() {
  try {
    const res = await fetch(`${API_BASE}/api/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        conversation: state.conversation,
        workInfo: state.workInfo
      })
    });
    const data = await res.json();
    if (data.error) { console.warn("analyze failed:", data.error); return; }
    renderProgress(data);
  } catch (e) { console.warn("analyze error:", e); }
}

function renderProgress(data) {
  const progress = data.progress || 0;
  const coverage = data.coverage || {};
  const prev = state.lastProgress || 0;
  const delta = progress - prev;

  const fill = document.getElementById("progress-fill");
  const label = document.getElementById("progress-label");
  const bar = document.getElementById("progress-bar");

  // Animate number count-up if progress changed
  animateNumber(label, prev, progress, "📊 取れ高: ", "%");
  fill.style.width = progress + "%";
  document.getElementById("progress-msg-count").textContent = `${data.risa_message_count || 0} 発言 / ${data.message_count || 0}`;

  // Celebration effect if progress went up
  if (delta >= 1) {
    fill.classList.remove("shimmer");
    void fill.offsetWidth; // force reflow
    fill.classList.add("shimmer");
    bar.classList.remove("celebrating");
    void bar.offsetWidth;
    bar.classList.add("celebrating");
    label.classList.remove("pulsing");
    void label.offsetWidth;
    label.classList.add("pulsing");
    spawnSparkles(bar, delta);
    showDeltaBadge(bar, delta);
  }

  state.lastProgress = progress;

  const detail = document.getElementById("progress-detail");
  detail.innerHTML = Object.entries(CATEGORY_LABELS).map(([key, label]) => {
    const score = coverage[key] || 0;
    const cls = score === 0 ? "zero" : score < 4 ? "low" : score < 7 ? "mid" : "high";
    return `<div class="progress-item">
      <span class="progress-item-label">${label}</span>
      <span class="progress-item-score ${cls}">${score}/10</span>
    </div>`;
  }).join("");
}

function animateNumber(el, from, to, prefix, suffix) {
  const start = performance.now();
  const duration = 800;
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    // easeOutCubic
    const eased = 1 - Math.pow(1 - t, 3);
    const val = Math.round(from + (to - from) * eased);
    el.textContent = `${prefix}${val}${suffix}`;
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function spawnSparkles(container, intensity) {
  const count = Math.min(6, Math.max(3, Math.floor(intensity)));
  const sparkleChars = ["✨", "🌸", "⭐", "💫", "💖"];
  const rect = container.getBoundingClientRect();
  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
    sparkle.style.left = (20 + Math.random() * (rect.width - 40)) + "px";
    sparkle.style.bottom = (8 + Math.random() * 10) + "px";
    sparkle.style.animationDelay = (i * 0.08) + "s";
    container.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 1500 + i * 80);
  }
}

function showDeltaBadge(container, delta) {
  const badge = document.createElement("div");
  badge.className = "progress-increase-badge";
  badge.textContent = `+${delta}% 🎉`;
  container.appendChild(badge);
  setTimeout(() => badge.remove(), 1600);
}

function toggleProgressDetail() {
  document.getElementById("progress-detail").classList.toggle("open");
}

async function callGeminiChat() {
  const res = await fetch(`${API_BASE}/api/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      workInfo: state.workInfo,
      selectedSeason: state.selectedSeason,
      briefing: state.briefing,
      conversation: state.conversation
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.reply;
}

document.getElementById("end-btn").onclick = async () => {
  if (state.conversation.length < 4) {
    if (!confirm("会話がまだ短いですが、本当に記事化しますか?")) return;
  }
  showScreen("screen-article");
  document.getElementById("article-loading").style.display = "block";
  document.getElementById("article-result").style.display = "none";
  document.getElementById("article-error").style.display = "none";
  try {
    const result = await generateArticle();
    document.getElementById("article-loading").style.display = "none";
    document.getElementById("article-result").style.display = "block";
    currentLang = "ja";
    switchLang("ja");
    renderRatings(result.ratings);
    if (state.sessionId) {
      fetch(`${API_BASE}/api/session/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id: state.sessionId, conversation: state.conversation,
          article: result.article_en, article_ja: result.article_ja,
          title_en: result.title_en, title_ja: result.title_ja,
          quotes: result.quotes || [], ratings: result.ratings || null
        })
      }).catch(e => console.warn("save failed:", e));
    }
    if (result.quotes?.length) {
      const ul = document.getElementById("quotes-list");
      ul.innerHTML = "";
      result.quotes.forEach(q => { const li = document.createElement("li"); li.textContent = q; ul.appendChild(li); });
      document.getElementById("quotes-box").style.display = "block";
    }
  } catch (e) {
    document.getElementById("article-loading").style.display = "none";
    document.getElementById("article-result").style.display = "block";
    const errEl = document.getElementById("article-error");
    errEl.style.display = "block"; errEl.textContent = "エラー: " + e.message;
  }
};

let currentLang = "ja";
let currentArticleData = null;
function switchLang(lang) {
  currentLang = lang;
  document.getElementById("tab-ja").className = lang === "ja" ? "btn btn-secondary" : "btn btn-ghost";
  document.getElementById("tab-en").className = lang === "en" ? "btn btn-secondary" : "btn btn-ghost";
  renderArticleContent();
}
function renderArticleContent() {
  if (!currentArticleData) return;
  const d = currentArticleData;
  const title = currentLang === "ja" ? (d.title_ja || "無題") : (d.title_en || "Untitled");
  const body = currentLang === "ja" ? (d.article_ja || "") : (d.article_en || "");
  document.getElementById("article-content").textContent = `# ${title}\n\n${body}`;
}

async function generateArticle() {
  const res = await fetch(`${API_BASE}/api/article`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      workInfo: state.workInfo,
      selectedSeason: state.selectedSeason,
      conversation: state.conversation
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  currentArticleData = {
    title_ja: data.title_ja || data.title || "",
    title_en: data.title_en || data.title || "",
    article_ja: data.article_ja || data.article || "",
    article_en: data.article_en || data.article || "",
    ratings: data.ratings || null,
    quotes: data.quotes || []
  };
  return currentArticleData;
}

function renderRatings(ratings) {
  if (!ratings) { document.getElementById("ratings-box").style.display = "none"; return; }
  const labels = {
    animation: "🎨 作画", story: "📖 脚本", voice_acting: "🎙️ 声優",
    music: "🎵 音楽", direction: "🎬 演出", characters: "👥 キャラ",
    emotional_impact: "💖 感情", overall: "⭐ 総合"
  };
  const items = Object.entries(labels).map(([k, label]) => {
    const r = ratings[k];
    if (!r) return "";
    return `<div style="margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <span style="color:var(--gold); font-weight:bold;">${label}</span>
        <span style="color:var(--accent); font-weight:bold;">${r.score || 0}/10</span>
      </div>
      <div style="color:#c8c8d0; font-size:0.82em; line-height:1.5;">${escapeHtml(r.comment || "")}</div>
    </div>`;
  }).join("");
  document.getElementById("ratings-list").innerHTML = items;
  document.getElementById("ratings-box").style.display = "block";
}

  const article = document.getElementById("article-content").textContent;
  navigator.clipboard.writeText(article).then(() => showToast(`コピーしました 📋 (${currentLang === "ja" ? "日本語" : "English"})`));
};

// ============================================================
function formatJST(isoString) {
  if (!isoString) return "";
  try {
    return new Date(isoString).toLocaleString("ja-JP", {
      timeZone: "Asia/Tokyo",
      year: "numeric", month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit"
    });
  } catch (e) { return isoString; }
}
function escapeHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
